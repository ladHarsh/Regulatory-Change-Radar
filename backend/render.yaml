services:
  - type: web
    name: regulatory-change-radar-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: radar-data
      mountPath: /data
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: RERANKER_MODEL
        value: cross-encoder/ms-marco-MiniLM-L-6-v2
      - key: DATA_DIR
        value: /data
      - key: CHROMA_DIR
        value: /data/chroma
      - key: SQLITE_URL
        value: sqlite:////data/radar.db
      - key: CORS_ORIGINS
        value: "https://regulatory-change-radar.vercel.app,https://regulatory-change-radar-git-main-ladharsh.vercel.app,http://localhost:5173,http://localhost:3000"
      - key: CHUNK_SIZE
        value: "512"
      - key: CHUNK_OVERLAP
        value: "50"
      - key: RETRIEVAL_TOP_K
        value: "20"
      - key: RERANK_TOP_N
        value: "5"
      - key: DIFF_UNCHANGED_THRESHOLD
        value: "0.95"
      - key: DIFF_MODIFIED_THRESHOLD
        value: "0.75"
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
