services:
  - type: web
    name: regulatory-change-radar-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: RERANKER_MODEL
        value: cross-encoder/ms-marco-MiniLM-L-6-v2
      - key: DATA_DIR
        value: ./data
      - key: CHROMA_DIR
        value: ./data/chroma
      - key: SQLITE_URL
        value: sqlite:///./data/radar.db
